    <form class="container page-header" id="banner">
        <fieldset id="registrationFieldset" class="shadow-sm">
            <div><legend>Confirm Registration</legend></div>
            <div>
                <label for="inputRegID" class="form-label mt-3">Registration ID (5-Digit)</label>
                <input type="text" class="form-control" id="inputRegID" placeholder="Enter registration ID" 
                        autocomplete="off">
                <small id="idStatus" class="form-text text-muted">We'll never share your name with anyone else.</small>
            </div>
            <div class="row">
                <div class="col-lg-6">
                    <label for="inputSurname" class="form-label mt-3">Surname</label>
                    <input type="text" class="form-control" id="inputSurname" aria-describedby="emailHelp"
                        placeholder="Enter Surname">
                </div>
                <div class="col-lg-6">
                    <label for="inputName" class="form-label mt-3">Name</label>
                    <input type="text" class="form-control" id="inputName" aria-describedby="emailHelp" placeholder="Enter Name">
                </div>
            </div>
            <div>
                <label for="selectPresbytery" class="form-label mt-3">Select Presbytery</label>
                <select class="form-select" id="selectPresbytery">
                    <option value="" selected hidden>Select a Presbytery</option>
                    <option>Amathole</option>
                    <option>Central Cape</option>
                    <option>Drakensberg</option>
                    <option>East Griqualand</option>
                    <option>eGoli</option>
                    <option>eThekwini</option>
                    <option>Highveld</option>
                    <option>Lekoa</option>
                    <option>Limpopo</option>
                    <option>Mthatha</option>
                    <option>Tiyo Soga Memorial</option>
                    <option>Trans-Xhariep</option>
                    <option>Tshwane</option>
                    <option>uThukela</option>
                    <option>Western Cape</option>
                </select>
            </div>
            <button type="button" class="btn btn-primary mt-3 btn-md" id="verifyBtn" onclick="submitID()">Verify</button>
        </fieldset>
        <fieldset id="voteFieldset" class="card shadow-sm mt-4" style="display: none;">
            <div class="card-header bg-primary text-white">
                <h5 id="voteTitle" class="mb-0">VOTE TITLE</h5>
            </div>
            <div class="card-body">
                <p id="voteDescription" class="text-muted">Vote desctription...</p>

                <div class="list-group mb-4">
                    <label class="list-group-item list-group-item-action">
                        <input class="form-check-input me-2" type="radio" name="presbytery" value="Amathole">
                        Option 1
                    </label>
                    <label class="list-group-item list-group-item-action">
                        <input class="form-check-input me-2" type="radio" name="presbytery" value="Central Cape">
                        Option 2
                    </label>
                    <label class="list-group-item list-group-item-action">
                        <input class="form-check-input me-2" type="radio" name="presbytery" value="East Griqualand">
                        Option 3
                    </label>
                    <label class="list-group-item list-group-item-action">
                        <input class="form-check-input me-2" type="radio" name="presbytery" value="Drakensberg">
                        Option 4
                    </label>
                </div>

                <div id="voteStatus" class="mb-3"></div>

                <button type="button" class="btn btn-success btn-md" id="voteBtn" onclick="submitVote()">
                    Submit Vote
                </button>
            </div>
        </fieldset>
    </form>
